personality = "pragmatic"
model = "auto"
model_provider = "llm-gateway"
sandbox_mode = "danger-full-access"
approval_policy = "never"
suppress_unstable_features_warning = true

[projects."/home/mhugo/code/unity"]
trust_level = "trusted"

[projects."/home/mhugo/code/singularity-ng/vectordrive"]
trust_level = "trusted"

[projects."/home/mhugo/code/dr-repo"]
trust_level = "trusted"

[notice]
hide_full_access_warning = true

[features]
unified_exec = true
shell_snapshot = true
multi_agent = true
multi_agent_v2 = { enabled = true, hide_spawn_agent_metadata = false, tool_namespace = "agents" }
steer = true
personality = true
undo = true
apply_patch_freeform = true
remote_models = true
collaboration_modes = true
js_repl = true
prevent_idle_sleep = true

[mcp_servers.centralcloud-mcp-gateway]
url = "http://mcp-gateway.svc/mcp"

[model_providers.llm-gateway]
name = "CentralCloud LLM Gateway"
base_url = "http://llm-gateway.svc:80/v1"
env_key = "LLM_MUX_API_KEY"
wire_api = "responses"

[model_providers.llm-gateway-models-codex]
name = "CentralCloud LLM Gateway (Codex models catalog only)"
base_url = "http://llm-gateway.svc:80/codex/v1"
env_key = "LLM_MUX_API_KEY"
wire_api = "responses"
