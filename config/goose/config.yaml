# Goose configuration — template tracked in dotfiles
# API keys are NOT stored here. They go in secrets.yaml (gitignored)
# or the system keyring (when GOOSE_DISABLE_KEYRING is not set).

# Provider
active_provider: openai
OPENAI_HOST: http://llm-gateway.svc

# Model — Kimi K3 (1,048,576 ctx, tools+reasoning+vision)
# Swarm alternatives: MiniMax-M3 (1M ctx), ollama-deepseek-v4-pro (524K ctx)
GOOSE_MODEL: kimi-code/k3
GOOSE_FAST_MODEL: auto-flash

# Planner — MiniMax-M3 via minimax.io coding-plan (1M ctx, tools+reasoning)
GOOSE_PLANNER_PROVIDER: openai
GOOSE_PLANNER_MODEL: minimax-coding-plan/MiniMax-M3
GOOSE_PLANNER_CONTEXT_LIMIT: 1000000

# Security
GOOSE_DISABLE_KEYRING: true    # Headless/WSL — use secrets.yaml instead of keyring

# Telemetry
GOOSE_TELEMETRY_ENABLED: true   # Anonymous usage data

# Context
GOOSE_CONTEXT_LIMIT: 1048576

# CLI — Claude Code-like: clean, minimal noise
GOOSE_CLI_THEME: dark
GOOSE_CLI_MIN_PRIORITY: 0.3          # Medium+ importance only (hide shell noise)
GOOSE_DISABLE_TOOL_CALL_SUMMARY: true # Skip per-tool AI summaries (saves tokens)
GOOSE_DISABLE_SESSION_NAMING: true    # Skip AI session naming (faster startup)
GOOSE_CLI_SHOW_COST: true             # Show token costs
GOOSE_MAX_CODE_BLOCK_LINES: 100       # More code before truncation
GOOSE_MODE: auto                      # YOLO — auto-approve all tools

# Providers — all route through llm-gateway.svc (OpenAI-compatible)
# Active model is set by GOOSE_MODEL above. These entries document the
# available models and their context limits for reference.
providers:
  # === Active (tools-capable) ===
  openai:
    enabled: true
    configured: true
    model: kimi-code/k3    # 1,048,576 ctx — default

  # MiniMax-M3 via minimax.io coding-plan (1M ctx, tools+reasoning)
  # Planner: minimax-coding-plan/MiniMax-M3
  # Swarm: delegate(model: "minimax-coding-plan/MiniMax-M3", ...)

  # kimi-code/k3 (1,048,576 ctx, tools+reasoning+vision) — default
  # CLI: goose, goose-kimi
  # Swarm: delegate(model: "kimi-code/k3", ...)

  # ollama-deepseek-v4-pro (524,288 ctx, tools+reasoning)
  # CLI: goose-deepseek
  # Swarm: delegate(model: "ollama-deepseek-v4-pro", ...)

  # === Chat-only (no tools — use for research/review) ===
  # umans-ai-coding-plan/umans-glm-5.2 (405,504 ctx)
  # CLI: goose-umans-glm
  # Swarm: delegate(model: "umans-ai-coding-plan/umans-glm-5.2", ...)

  # umans-ai-coding-plan/umans-kimi-k2.7 (262,144 ctx)
  # CLI: goose-umans-kimi
  # Swarm: delegate(model: "umans-ai-coding-plan/umans-kimi-k2.7", ...)

  # umans-ai-coding-plan/umans-flash (262,144 ctx)
  # CLI: goose-umans-flash
  # Swarm: delegate(model: "umans-ai-coding-plan/umans-flash", ...)

  # === Other providers (disabled) ===
  claude-acp:
    enabled: false
    configured: false
    model: current
  codex-acp:
    enabled: false
    configured: false
    model: current
  mistral:
    enabled: false
    configured: false
    model: mistral-medium-latest

# Extensions
extensions:
  # External
  centralcloud-mcp-gateway:
    name: centralcloud-mcp-gateway
    type: streamable_http
    description: CentralCloud MCP gateway
    uri: http://mcp-gateway.svc/mcp
    enabled: true
    timeout: 300

  # Built-in platform extensions
  developer:
    type: platform
    name: developer
    enabled: true
    bundled: true
    display_name: Developer
  tom:
    type: platform
    name: tom
    enabled: true
    bundled: true
    display_name: Top Of Mind
  skills:
    type: platform
    name: skills
    enabled: true
    bundled: true
    display_name: Skills
  summon:
    type: platform
    name: summon
    enabled: true
    bundled: true
    display_name: Summon
  orchestrator:
    type: platform
    name: orchestrator
    enabled: true
    bundled: true
    display_name: Orchestrator
  analyze:
    type: platform
    name: analyze
    enabled: true
    bundled: true
    display_name: Analyze
  apps:
    type: platform
    name: apps
    enabled: true
    bundled: true
    display_name: Apps
  extensionmanager:
    type: platform
    name: Extension Manager
    enabled: true
    bundled: true
    display_name: Extension Manager
  todo:
    type: platform
    name: todo
    enabled: true
    bundled: true
    display_name: Todo

  # Disabled built-ins
  summarize:
    type: platform
    name: summarize
    enabled: false
    bundled: true
    display_name: Summarize
  chatrecall:
    type: platform
    name: chatrecall
    enabled: false
    bundled: true
    display_name: Chat Recall
  code_execution:
    type: platform
    name: code_execution
    enabled: false
    bundled: true
    display_name: Code Mode
