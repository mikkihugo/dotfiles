active_provider: openai
OPENAI_HOST: http://llm-gateway.svc
GOOSE_DISABLE_KEYRING: true
GOOSE_CONTEXT_LIMIT: 405504
claude-acp_configured: false
codex-acp_configured: false
mistral_configured: false
providers:
  openai:
    enabled: true
    configured: true
    model: auto-glm
  claude-acp:
    enabled: false
    configured: false
    model: current
  codex-acp:
    enabled: false
    configured: false
    model: current
  mistral:
    enabled: false
    configured: false
    model: mistral-medium-latest
extensions:
  centralcloud-mcp-gateway:
    name: centralcloud-mcp-gateway
    type: streamable_http
    description: CentralCloud MCP gateway
    uri: http://mcp-gateway.svc/mcp
    enabled: true
    timeout: 300
