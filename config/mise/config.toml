[tools]
"aqua:openai/codex" = "latest"
"npm:@moonshot-ai/kimi-code" = "latest"
"github:aaif-goose/goose" = "latest"
# ACP adapter so goose can use Claude Code as provider `claude-acp`.
"npm:@agentclientprotocol/claude-agent-acp" = "latest"
# ACP adapter so goose can use ChatGPT/Codex OAuth (~/.codex) as `codex-acp`.
"npm:@agentclientprotocol/codex-acp" = "latest"
# Qoder CLI is not in the mise registry; pin the OSS release tarball (http backend).
"http:qodercli" = { version = "1.1.1", url = "https://qoder-ide.oss-accelerate.aliyuncs.com/qodercli/releases/1.1.1/qodercli-linux-x64.tar.gz", checksum = "sha256:21b60e3d0d9db9c35e5385c6d9523628e18735b7be5bbbc1a91996e4ed6a2b2a" }
"github:vinhnx/vtcode" = "latest"
flyctl = "latest"
"aqua:nodejs/node" = "24"
"npm:@github/copilot" = "latest"
"npm:@hrrrsn/mcp-vnc" = "latest"
"npm:@playwright/mcp" = "latest"
"npm:@google/gemini-cli" = "latest"
"npm:@google/jules" = "latest"
"npm:@neovate/code" = "latest"
"npm:@openapitools/openapi-generator-cli" = "latest"
"npm:ts-node" = "latest"
gcloud = "latest"
"npm:firebase-tools" = "latest"
python = "latest"
pulumi = "latest"
java = "latest"
crush = "latest"
hcloud = "latest"
opencode = "latest"
cloudflared = "latest"
uv = "latest"
rust = "latest"
helm = "latest"
flux2 = "latest"
k9s = "latest"
gitui = "latest"
dust = "latest"
stern = "latest"
kubectx = "latest"
kubens = "latest"
kubeseal = "latest"
"github:contabo/cntb" = "latest"
"github:ovh/ovhcloud-cli" = "latest"
awscli = { version = "latest", symlink_bins = "true" }
cosign = "latest"
# claude: managed by the native installer (~/.local/bin/claude, auto-updating), not mise.
claude-squad = "latest"
"npm:@kilocode/cli" = "latest"
"npm:droid" = "latest"
azure-cli = { version = "latest", uvx_args = "--prerelease=allow" }
"pipx:nanobot-ai" = "latest"
"npm:wrangler" = "latest"
oci = "latest"
vultr-cli = "latest"
"pipx:b2" = "latest"
"go:github.com/steipete/gogcli/cmd/gog" = "latest"
"npm:@just-every/code" = "latest"

[env]
# kimi-code reads this from process.env (resolveCompletionBudget) — it is NOT a
# kimi-code config.toml key, and the `kimi` launcher is a compiled binary. Caps
# compaction (and turn) max_completion_tokens below provider output limits, which
# fixes the compaction APIContextOverflowError on non-clamping providers like
# ollama-cloud. 32768 is safe across the configured model set; raise toward 65536
# if you only use models whose real output limit is >= 131072 (e.g. devstral-2:123b).
# See MoonshotAI/kimi-code PR #829.
KIMI_MODEL_MAX_COMPLETION_TOKENS = "32768"

[settings]
yes = true
# Auto-trust mise config files in own repos (covers git worktrees, which
# otherwise prompt per-path on every new worktree).
trusted_config_paths = ["/home/mhugo/code", "/home/mhugo/.dotfiles"]
minimum_release_age = "1h"
