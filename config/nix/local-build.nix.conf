# Nix user configuration — shared devbox builder pool.
#
# Default for this workstation: build locally and fan out heavy Linux builds to
# the first two healthy fleet builders. Builders pull substitutes so they reuse
# cache.flakecache.com/default before compiling. Cache uploads are owned by the
# system-level NixOS post-build hook, not this user nix.conf.

extra-experimental-features = nix-command flakes
extra-substituters = https://cache.flakecache.com/default
extra-trusted-public-keys = default:ESyvaQTiq681JA0iaH5tsQWS+R5qqJUVdVY1OXbi9to=

# Local builds plus the first two healthy remote builders.
builders = ssh-ng://root@159.195.138.16 x86_64-linux /home/mhugo/.ssh/personal_admin_id_ed25519 12 1 benchmark,big-parallel,kvm,nixos-test ; ssh-ng://root@89.167.50.230 x86_64-linux /home/mhugo/.ssh/personal_admin_id_ed25519 16 1 benchmark,big-parallel,kvm,nixos-test
builders-use-substitutes = true

# jj uses git as backend; working copy is never "clean" in git terms — suppress the warning
warn-dirty = false

# Accept flake nixConfig settings without interactive prompts.
# Flake fallback=true requires trust to apply; without this Nix hard-fails on cache 502s.
accept-flake-config = true
fallback = true
connect-timeout = 5
