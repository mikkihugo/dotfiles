# Nix user configuration — managed by dotfiles, linked via home-manager.
#
# Remote builder: llm-gateway builds CUDA workers (no GPU needed for compilation).
# After nixos-rebuild on llm-gateway, derivations live in its nix store and
# nix-serve serves them. Local hms substitutes from cache — no recompilation.
#
extra-experimental-features = nix-command flakes

# Builder spec: ssh://host arch - max-jobs speed-factor supported-features mandatory-features
# 16 jobs, big-parallel feature (llama.cpp/nvcc are massively parallel).
builders = ssh://llm-gateway.centralcloud.com x86_64-linux - 16 - big-parallel
builders-use-substitutes = true

# llm-gateway nix-serve — served at /nix-cache, signed with llm-gateway-cache key.
# Key published at: https://llm-gateway.centralcloud.com/nix-cache/cache-public-key.pem
extra-substituters = https://llm-gateway.centralcloud.com/nix-cache https://cuda-maintainers.cachix.org https://nix-community.cachix.org
extra-trusted-public-keys = llm-gateway-cache:NmMZOYszXeoKXQ2zL+pYhN/EGdjWSvI1E8wA9XoRprU= cuda-maintainers.cachix.org-1:0dq3bujKpuEPMCX6U4WylrUDZ9JyUG0VpVZa7CNfq5E= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
