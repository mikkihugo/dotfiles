# Nix user configuration — remote builder enabled.
#
# Used on the main Linux workstation so llm-gateway can build CUDA workers.

extra-experimental-features = nix-command flakes

# Builder spec: ssh://host arch - max-jobs speed-factor supported-features mandatory-features
# 16 jobs, big-parallel feature (llama.cpp/nvcc are massively parallel).
builders = ssh://llm-gateway.centralcloud.com x86_64-linux - 16 - big-parallel
builders-use-substitutes = true

# Binary caches — Centralcloud Attic + upstream CUDA/community + numtide AI tools.
extra-substituters = https://cache.centralcloud.com/default https://cuda-maintainers.cachix.org https://nix-community.cachix.org https://cache.numtide.com
extra-trusted-public-keys = default:ywfU21WX06iOn2Ec2lae1jYh4w8LO4IQkmp06vJzsk8= cuda-maintainers.cachix.org-1:0dq3bujKpuEPMCX6U4WylrUDZ9JyUG0VpVZa7CNfq5E= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g=

# jj uses git as backend; working copy is never "clean" in git terms — suppress the warning
warn-dirty = false

# Accept flake nixConfig settings without interactive prompts.
# The ace-coder flake sets fallback=true and connect-timeout=5; without this
# those settings aren't trusted so Nix hard-fails on cache 502s instead of falling back.
accept-flake-config = true
fallback = true
connect-timeout = 5
