# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  Starship Prompt - Modern & Beautiful                                    ║
# ║  Optimized for Nerd Fonts & True Color terminals                         ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

# Performance
command_timeout = 500
scan_timeout = 100
add_newline = true

# ═══════════════════════════════════════════════════════════════════════════
# Main Prompt Format
# ═══════════════════════════════════════════════════════════════════════════
format = """
[╭─](bold blue)\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_metrics\
$fill\
$nodejs\
$rust\
$golang\
$python\
$bun\
$deno\
$nix_shell\
$docker_context\
$memory_usage\
$custom_load\
$cmd_duration\
$time
[╰─](bold blue)$character"""

# Right-side prompt
right_format = ""

# Fill space between left and right
[fill]
symbol = " "

# ═══════════════════════════════════════════════════════════════════════════
# Prompt Character
# ═══════════════════════════════════════════════════════════════════════════
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"

# ═══════════════════════════════════════════════════════════════════════════
# User & Host
# ═══════════════════════════════════════════════════════════════════════════
[username]
show_always = false
format = "[ $user](bold fg:33) "
style_user = "bold fg:33"
style_root = "bold fg:196"

[hostname]
ssh_only = true
format = "[@$hostname](bold fg:33) "
style = "bold fg:33"

# ═══════════════════════════════════════════════════════════════════════════
# Directory
# ═══════════════════════════════════════════════════════════════════════════
[directory]
truncation_length = 4
truncate_to_repo = true
format = "[ $path]($style)[$read_only]($read_only_style) "
style = "bold cyan"
read_only = " 󰌾"
read_only_style = "bold red"
truncation_symbol = "…/"
home_symbol = "󰋜 ~"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"code" = "󰲋 "
"singularity" = " "

# ═══════════════════════════════════════════════════════════════════════════
# Git
# ═══════════════════════════════════════════════════════════════════════════
[git_branch]
symbol = " "
format = "[$symbol$branch(:$remote_branch)]($style) "
style = "bold purple"
truncation_length = 20
truncation_symbol = "…"

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "bold red"
conflicted = "🏳 "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
up_to_date = ""
untracked = "?${count} "
stashed = "≡${count} "
modified = "!${count} "
staged = "[+${count}](bold green) "
renamed = "»${count} "
deleted = "✘${count} "

[git_metrics]
disabled = false
added_style = "bold green"
deleted_style = "bold red"
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"

[git_commit]
commit_hash_length = 7
tag_symbol = "🏷 "
format = "[$hash$tag]($style) "
style = "bold yellow"

# ═══════════════════════════════════════════════════════════════════════════
# Programming Languages
# ═══════════════════════════════════════════════════════════════════════════
[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold green"
detect_extensions = ["js", "mjs", "cjs", "ts", "mts", "cts"]

[bun]
symbol = "󰐔 "
format = "[$symbol($version )]($style)"
style = "bold fg:214"

[deno]
symbol = "🦕 "
format = "[$symbol($version )]($style)"
style = "bold green"

[rust]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold red"

[python]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold yellow"
pyenv_version_name = true

[golang]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold cyan"

# ═══════════════════════════════════════════════════════════════════════════
# Environment & Tools
# ═══════════════════════════════════════════════════════════════════════════
[nix_shell]
symbol = " "
format = "[$symbol$state( \\($name\\))]($style) "
style = "bold blue"
impure_msg = "[impure](bold red)"
pure_msg = "[pure](bold green)"

[docker_context]
symbol = " "
format = "[$symbol$context]($style) "
style = "bold blue"
only_with_files = true

[conda]
symbol = " "
format = "[$symbol$environment]($style) "
style = "bold green"

# ═══════════════════════════════════════════════════════════════════════════
# Utilities
# ═══════════════════════════════════════════════════════════════════════════
[memory_usage]
disabled = false
threshold = 75
format = "[  $ram_pct]($style) "
style = "bold dimmed white"
symbol = " "

[custom.load]
disabled = false
command = "cat /proc/loadavg | awk '{print $1\" \"$2\" \"$3}'"
when = "test -f /proc/loadavg"
format = "[ $output]($style) "
style = "bold dimmed white"
symbol = "󰓅"

[cmd_duration]
min_time = 2_000
format = "[󱦟 $duration]($style) "
style = "bold yellow"
show_milliseconds = false

[time]
disabled = false
format = "[ $time]($style) "
style = "bold fg:243"
time_format = "%H:%M"
utc_time_offset = "local"

[battery]
disabled = false
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
unknown_symbol = "󰁽 "
empty_symbol = "󰂎 "

[[battery.display]]
threshold = 10
style = "bold red"

[[battery.display]]
threshold = 30
style = "bold yellow"

[[battery.display]]
threshold = 100
style = "bold green"

[status]
disabled = false
format = "[$symbol$status]($style) "
symbol = "✖ "
style = "bold red"

# ═══════════════════════════════════════════════════════════════════════════
# Cloud & Infrastructure
# ═══════════════════════════════════════════════════════════════════════════
[aws]
disabled = false
symbol = "☁️  "
format = "[$symbol($profile )(\\($region\\) )]($style)"
style = "bold yellow"

[gcloud]
disabled = false
symbol = "️🇬️ "
format = "[$symbol$account(@$domain)(\\($region\\))]($style) "
style = "bold blue"

# ═══════════════════════════════════════════════════════════════════════════
# Package Managers
# ═══════════════════════════════════════════════════════════════════════════
[package]
disabled = false
symbol = "󰏗 "
format = "[$symbol$version]($style) "
style = "bold fg:208"

# ═══════════════════════════════════════════════════════════════════════════
# Kubernetes
# ═══════════════════════════════════════════════════════════════════════════
[kubernetes]
disabled = false
symbol = "☸ "
format = "[$symbol$context( \\($namespace\\))]($style) "
style = "bold blue"

# Disable modules we rarely need
[cmake]
disabled = true

[cobol]
disabled = true

[crystal]
disabled = true

[daml]
disabled = true

[dart]
disabled = true

[elixir]
disabled = true

[elm]
disabled = true

[erlang]
disabled = true

[haskell]
disabled = true

[helm]
disabled = true

[java]
disabled = true

[julia]
disabled = true

[kotlin]
disabled = true

[lua]
disabled = true

[nim]
disabled = true

[ocaml]
disabled = true

[perl]
disabled = true

[php]
disabled = true

[purescript]
disabled = true

[red]
disabled = true

[ruby]
disabled = true

[scala]
disabled = true

[swift]
disabled = true

[terraform]
disabled = true

[vagrant]
disabled = true

