pre-commit:
  parallel: true
  commands:
    alejandra:
      glob: "*.nix"
      run: alejandra --check {staged_files}

    statix:
      glob: "*.nix"
      # statix check accepts only one target at a time; loop over staged files
      run: for f in {staged_files}; do statix check "$f" || exit 1; done

    shellcheck:
      glob: "*.sh"
      run: shellcheck --external-sources {staged_files}

    shfmt:
      glob: "*.sh"
      run: shfmt -d {staged_files}

    typos:
      exclude: '\.(gz|bin|wasm|lock)$|^secrets/'
      run: typos --force-exclude {staged_files}

    detect-secrets:
      exclude: \.secrets\.baseline$
      run: detect-secrets-hook --baseline .secrets.baseline {staged_files}
