# .typos.toml — typos spell-checker configuration
#
# Purpose: allowlist technical terms that typos incorrectly flags.

[files]
extend-exclude = ["services/ace-embedding-worker/bin/", "secrets/"]

[default.extend-words]
# Ratatui is a Rust TUI framework (https://ratatui.rs), not a misspelling of
# the film "Ratatouille".
Ratatui = "Ratatui"
# "mch" appears in an age public key in .sops.yaml — not a word.
mch = "mch"
VaultCorp = "VaultCorp"
Vault = "Vault"
# "hel" is the IATA/infra abbreviation for Helsinki, used in node names (cc-fi-hel-*).
hel = "hel"
# "nd" is a shell alias for `nom` diff mode (alongside `nb`/`ns`), not a
# misspelling of "and". Defined in home/modules/shell.nix and documented in
# README.md's nix-dev-tooling section.
nd = "nd"
# "ue" is an EZA_COLORS key (user-execute), not a misspelling of "use"/"due".
# See config/rust-tools.sh.
ue = "ue"
