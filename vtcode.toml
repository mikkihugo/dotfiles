# VT Code Configuration File
[agent]
provider = "minimax-io"
default_model = "MiniMax-M3"
api_key_env = "MINIMAX_API_KEY"

[agent.small_model]
enabled = true
model = "kimi-k2.6:cloud"

[permissions]
default_mode = "auto"

[[custom_providers]]
name = "opencode-go"
display_name = "OpenCode Go"
base_url = "https://opencode.ai/zen/go/v1"
api_key_env = "OPENCODE_GO_API_KEY"
model = "minimax-m3"

[[custom_providers]]
name = "kimi-code"
display_name = "Kimi Code"
base_url = "https://opencode.ai/zen/go/v1"
api_key_env = "OPENCODE_GO_API_KEY"
model = "kimi-k2.5"

[[custom_providers]]
name = "opencode-zai"
display_name = "Z.AI GLM"
base_url = "https://opencode.ai/zen/go/v1"
api_key_env = "OPENCODE_GO_API_KEY"
model = "glm-5.1"

[[custom_providers]]
name = "ollama-cloud"
display_name = "Ollama Cloud"
base_url = "https://ollama.com/v1"
api_key_env = "OLLAMA_API_KEY"
model = "gemma3:27b"

[[custom_providers]]
name = "minimax-io"
display_name = "MiniMax (native, zen-independent)"
base_url = "https://api.minimax.io/v1"
api_key_env = "MINIMAX_API_KEY"
model = "MiniMax-M3"
