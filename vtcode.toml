# VT Code — llm-gateway.svc only (OpenAI-compat). MCP → mcp-gateway.svc.
# Runtime wrappers inject OPENAI_API_KEY + OPENAI_BASE_URL=http://llm-gateway.svc/v1.
[agent]
provider = "openai"
default_model = "auto-glm"
api_key_env = "OPENAI_API_KEY"

[agent.small_model]
enabled = true
model = "auto-glm"

[permissions]
default_mode = "auto"

custom_providers = []

[mcp]
enabled = true

[[mcp.providers]]
name = "centralcloud-mcp-gateway"
endpoint = "http://mcp-gateway.svc/mcp"
protocol_version = "2024-11-05"
enabled = true
max_concurrent_requests = 3
